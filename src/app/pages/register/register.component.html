<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__header">
      <p class="auth-card__eyebrow">LearnHub LMS</p>
      <h1>Create account</h1>
      <p class="auth-card__subtitle">Join as a student and start learning.</p>
    </div>

    <app-page-alert [message]="apiError()" />

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label for="fullName">Full name</label>
        <input id="fullName" type="text" formControlName="fullName" autocomplete="name" />
        @if (fieldError('fullName'); as error) {
          <p class="field__error">{{ error }}</p>
        }
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" autocomplete="email" />
        @if (fieldError('email'); as error) {
          <p class="field__error">{{ error }}</p>
        }
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="new-password"
        />
        @if (fieldError('password'); as error) {
          <p class="field__error">{{ error }}</p>
        }
      </div>

      <button class="btn btn--primary" type="submit" [disabled]="submitting()">
        {{ submitting() ? 'Creating account...' : 'Create account' }}
      </button>
    </form>

    <p class="auth-card__footer">
      Already have an account?
      <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
