<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__header">
      <p class="auth-card__eyebrow">LearnHub LMS</p>
      <h1>Sign in</h1>
      <p class="auth-card__subtitle">Access your learning dashboard.</p>
    </div>

    @if (successMessage(); as success) {
      <p class="auth-success">{{ success }}</p>
    }
    <app-page-alert [message]="apiError()" />

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" autocomplete="email" />
        @if (fieldError('email'); as error) {
          <p class="field__error">{{ error }}</p>
        }
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
        />
        @if (fieldError('password'); as error) {
          <p class="field__error">{{ error }}</p>
        }
      </div>

      <button class="btn btn--primary" type="submit" [disabled]="submitting()">
        {{ submitting() ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>

    <p class="auth-card__footer">
      New here?
      <a routerLink="/register">Create an account</a>
    </p>
  </div>
</div>
